# Optional: install hooks with `pip install pre-commit && pre-commit install`
# The canonical gate is `python3 scripts/pre_commit_check.py` on Unix-like hosts
# (or `py -3.11 scripts/pre_commit_check.py` / `python scripts/pre_commit_check.py` on Windows).
repos:
  - repo: local
    hooks:
      - id: repo-pre-commit-check
        name: scripts/pre_commit_check.py
        entry: python scripts/pre_commit_check.py
        language: python
        pass_filenames: false
        always_run: true
