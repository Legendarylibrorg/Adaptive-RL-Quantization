# Optional: install hooks with `pip install pre-commit && pre-commit install`
# The canonical gate is still `bash scripts/pre_commit_check.sh` (used by CI).
repos:
  - repo: local
    hooks:
      - id: repo-pre-commit-check
        name: scripts/pre_commit_check.sh
        entry: bash scripts/pre_commit_check.sh
        language: system
        pass_filenames: false
        always_run: true
