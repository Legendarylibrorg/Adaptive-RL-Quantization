version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ["*"]
    labels:
      - dependencies
      - ci

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-optional-extras:
        patterns:
          - "huggingface_hub"
          - "torch"
          - "transformers"
          - "ruff"
          - "pip-audit"
    labels:
      - dependencies
      - python

  - package-ecosystem: pip
    directory: "/requirements"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      ci-bootstrap:
        patterns:
          - "ci.txt"
          - "pytorch.in"
          - "pytorch-cpu.txt"
          - "dev.txt"
    labels:
      - dependencies
      - ci
