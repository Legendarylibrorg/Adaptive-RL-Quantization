name: Dependency Review

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: read

jobs:
  # Job always finishes green: on public repos run the action; on private, review step is skipped.
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Review dependency changes
        if: github.event.repository.private == false
        uses: actions/dependency-review-action@dcd589ca9f7a6ded22e224ca2e288beb6bf9846b
        with:
          fail-on-severity: high
          vulnerability-check: true
          license-check: true
