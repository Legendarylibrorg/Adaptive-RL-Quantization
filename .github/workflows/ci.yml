# Elevated quality gate: Linux, Python 3.11+, editable install, full test suite, whitespace/scripts.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHON_BIN: python
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      # Immutable full SHAs (verify against api.github.com/repos/{actions/checkout,actions/setup-python}/commits/{sha}).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Secret pattern scan (tracked files, no third-party scanner)
        run: bash scripts/secret_scan.sh

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (editable)
        run: $PYTHON_BIN -m pip install -U pip && $PYTHON_BIN -m pip install -e .

      - name: Pre-commit checks (syntax, bash, whitespace, tests)
        run: bash scripts/pre_commit_check.sh

      - name: Short E2E RL smoke (simulator)
        run: $PYTHON_BIN run_research.py --config config.e2e_smoke.json
