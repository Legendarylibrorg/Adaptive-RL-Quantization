# Quality gate: hash-verified setuptools → editable install (setuptools build backend) → pre_commit_check (tests, git, syntax) → E2E RL smoke.
# Linux, macOS, and Windows. Windows uses core.autocrlf=false so `git diff --check` in pre_commit_check does not false-positive on LF-only trees.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.11"
    steps:
      # Pinned to actions/checkout@v4.3.1 and actions/setup-python@v5.6.0 (see api.github.com/.../git/refs/tags/...).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Line endings for git checks (Windows)
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: false
          check-latest: true
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/ci.txt
            security/dependency_hashes.json

      - name: Upgrade pip (interpreter on PATH)
        run: python -m pip install -U pip

      - name: Secret pattern scan (tracked files, no third-party scanner)
        run: python scripts/secret_scan.py

      - name: Verify dependency hashes
        run: python scripts/verify_hashes.py --output "${{ runner.temp }}/requirements-ci.txt"

      - name: Install verified bootstrap dependencies
        run: |
          python -m pip install --require-hashes -r "${{ runner.temp }}/requirements-ci.txt"

      - name: Install (editable, no build isolation)
        run: |
          python -m pip install --no-build-isolation -e .

      - name: Pre-commit checks (syntax, whitespace, tests)
        run: python scripts/pre_commit_check.py --skip-hash-checks

      - name: Short E2E RL smoke (simulator)
        run: python run_research.py --config config.e2e_smoke.json
