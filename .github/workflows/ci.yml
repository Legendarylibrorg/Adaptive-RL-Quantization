# Quality gate: ci_precheck (fast) → hash-verified setuptools → editable install → pre_commit_check → E2E RL smoke.
# OS coverage on the declared Python (3.12) plus interpreter coverage (3.11/3.13) on Linux to actually exercise the `requires-python = ">=3.11"` floor and ceiling.
# Windows: git config + safe.directory so `pre_commit_check` git diff --check and subprocess git behave reliably.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"
  ADAPTIVE_RL_ABORT_ON_SECURITY_BYPASS: "1"

jobs:
  precheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231

      - name: Set up Python 3.12
        uses: actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48
        with:
          python-version: "3.12"

      - name: CI precheck (supply chain, secrets, syntax, CLI security)
        run: python scripts/ci_precheck.py

  pip-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231

      - name: Set up Python 3.12
        uses: actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48
        with:
          python-version: "3.12"

      - name: Audit hash-pinned CI dependencies
        run: |
          python scripts/verify_hashes.py --output "${{ runner.temp }}/requirements-ci.txt"
          python scripts/verify_lockfiles.py
          python -m pip install --require-hashes -r "${{ runner.temp }}/requirements-ci.txt"
          python -m pip install --require-hashes -r requirements/dev.txt
          python -m pip_audit -r "${{ runner.temp }}/requirements-ci.txt"
          python -m pip_audit -r requirements/dev.txt

  test:
    needs: precheck
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, python-version: "3.11" }
          - { os: ubuntu-latest, python-version: "3.12" }
          - { os: ubuntu-latest, python-version: "3.13" }
          - { os: macos-latest, python-version: "3.12" }
          - { os: windows-latest, python-version: "3.12" }
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231

      - name: Git for Windows (pre_commit / unittest)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          git config --global core.autocrlf false
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/ci.txt
            requirements/dev.txt
            security/dependency_hashes.json

      - name: Secret pattern scan (tracked files, no third-party scanner)
        run: python scripts/secret_scan.py

      - name: Verify dependency hashes and lockfiles
        run: |
          python scripts/verify_hashes.py --output "${{ runner.temp }}/requirements-ci.txt"
          python scripts/verify_lockfiles.py

      - name: Install verified bootstrap dependencies
        run: |
          python -m pip install --require-hashes -r "${{ runner.temp }}/requirements-ci.txt"

      - name: Install (editable, no build isolation)
        run: |
          python -m pip install --no-build-isolation -e .

      - name: Install hash-pinned dev tools (ruff, mypy, coverage)
        run: python -m pip install --require-hashes -r requirements/dev.txt

      - name: Pre-commit checks (syntax, whitespace, tests)
        run: python scripts/pre_commit_check.py --skip-hash-checks

      - name: Short E2E RL smoke (simulator)
        run: python run_research.py --config config.e2e_smoke.json

      - name: Coverage report (adaptive_quant)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          python -m coverage run --rcfile pyproject.toml -m unittest discover -s tests -t . -q
          python -m coverage report --rcfile pyproject.toml

  torch-cpu-smoke:
    needs: precheck
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231

      - name: Set up Python 3.12
        uses: actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/ci.txt
            requirements/pytorch-cpu.txt
            security/dependency_hashes.json

      - name: Verify dependency hashes and lockfiles
        run: |
          python scripts/verify_hashes.py --output "${{ runner.temp }}/requirements-ci.txt"
          python scripts/verify_lockfiles.py

      - name: Install verified bootstrap dependencies
        run: python -m pip install --require-hashes -r "${{ runner.temp }}/requirements-ci.txt"

      - name: Install (editable, no build isolation)
        run: python -m pip install --no-build-isolation -e .

      - name: Install hash-pinned CPU PyTorch stack
        run: python -m pip install --require-hashes -r requirements/pytorch-cpu.txt

      - name: Torch trainer unit smoke
        run: python -m unittest tests.test_torch_trainer -q
